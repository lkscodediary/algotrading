[loggers]
keys=root

[handlers]
keys=consoleHandler,TimedRotatingFileHandler
#keys=consoleHandler,FileHandler,TimedRotatingFileHandler,RotatingFileHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=DEBUG
handlers=consoleHandler,TimedRotatingFileHandler
#handlers=consoleHandler,FileHandler,TimedRotatingFileHandler,RotatingFileHandler

[handler_consoleHandler]
class=StreamHandler
#level=DEBUG
formatter=simpleFormatter
args=(sys.stdout,)

[handler_FileHandler]
class=logging.FileHandler
#level=DEBUG
formatter=simpleFormatter
args=("logs/app.log", 'a')

[handler_RotatingFileHandler]
class=logging.handlers.RotatingFileHandler
#level=DEBUG
formatter=simpleFormatter
args=("logs/app.log",'a',10000000,5) #maxBytes=1000, backupCount=5

[handler_TimedRotatingFileHandler]
class=logging.handlers.TimedRotatingFileHandler
#level=DEBUG
formatter=simpleFormatter
args=("logs/app.log", 'midnight', 1)

[formatter_simpleFormatter]
format = %(asctime)s - %(name)-s - %(levelname)-s - %(funcName)s - %(lineno)-4s - %(message)s
datefmt = %Y-%m-%d %I:%M:%S %p
class=logging.Formatter

#Each handler can handle different level. Console can be INFO and File can be DEBUG